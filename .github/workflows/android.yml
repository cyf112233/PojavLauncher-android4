name: Android CI

on:
  pull_request:
    branches-ignore:
      - 'l10n_v3_openjdk2'
  push:
    branches-ignore:
      - 'l10n_v3_openjdk2'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GPLAY_KEYSTORE_PASSWORD: ${{ secrets.GPLAY_KEYSTORE_PASSWORD }}
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8


    - name: Get gl4es
      uses: dawidd6/action-download-artifact@v2
      with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: android.yml
          path: app_pojavlauncher/src/main/jniLibs
          workflow_conclusion: success
          repo: cyf112233/gl4es-114-extra
          branch: master
          name: gl4es-114
          
    - name: Build Debug .apk (arm64 only)
      run: |
        ./gradlew :app_pojavlauncher:assembleDebug -Pandroid.abiFilters=arm64-v8a
        mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
          name: app-debug-arm64
          path: out/app-debug.apk
