name: Android CI

on:
  pull_request:
    branches-ignore:
      - 'l10n_v3_openjdk2'
  push:
    branches-ignore:
      - 'l10n_v3_openjdk2'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GPLAY_KEYSTORE_PASSWORD: ${{ secrets.GPLAY_KEYSTORE_PASSWORD }}
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8

    # 下载 gl4es（假设 artifact 中包含 arm64 库，或单独指定 arm64 的 artifact 名称）
    - name: Get gl4es
      uses: dawidd6/action-download-artifact@v2
      with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: android.yml
          path: app_pojavlauncher/src/main/jniLibs
          workflow_conclusion: success
          repo: Google61/gl4es-114-extra
          branch: master
          name: gl4es-114   # 如果该 artifact 包含所有架构，后续会清理非 arm64 的 so

    # 下载 arm64 版本的 JRE8
    - name: Get JRE8 (arm64)
      uses: dawidd6/action-download-artifact@v2.17.0
      with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre
          repo: Google61/openjdk-build-android
          workflow_conclusion: success
          branch: jre8-api19
          name: jre8-aarch64   # 改为 arm64 的 artifact

    # 如果 gl4es artifact 包含多架构，只保留 arm64-v8a
    - name: Keep only arm64 gl4es libraries
      run: |
        JNILIBS_DIR="app_pojavlauncher/src/main/jniLibs"
        if [ -d "$JNILIBS_DIR" ]; then
          # 删除所有非 arm64-v8a 的目录
          find "$JNILIBS_DIR" -mindepth 1 -maxdepth 1 -type d ! -name "arm64-v8a" -exec rm -rf {} +
        fi

    # 构建 JRE JAR 文件
    - name: Build JRE JAR files
      run: |
        chmod +x scripts/languagelist_updater.sh
        bash scripts/languagelist_updater.sh
      
        cd app_pojavlauncher/src/main/assets/components/jre
        mv jre8*.tar.xz bin-arm64.tar.xz   # 改名适配 arm64
        tar -cf universal.tar.xz -T /dev/null
        date +%Y%m%d > version
        cd $GITHUB_WORKSPACE
        
        mkdir -p out
        chmod +x gradlew
        ./gradlew clean
        # 构建 JRE JAR 文件
        ./gradlew :jre_lwjgl3glfw:build

    # 构建 Google Play .aab（仅 arm64）
    - name: Build Google Play .aab (arm64 only)
      if: github.repository_owner == 'PojavLauncherTeam' && github.ref_name == 'v3_openjdk'
      run: |
        # 通过 gradle 属性限制 ABI 为 arm64-v8a
        ./gradlew :app_pojavlauncher:bundleGplay -Pandroid.abiFilters=arm64-v8a
        mv app_pojavlauncher/build/outputs/bundle/gplay/app_pojavlauncher-gplay.aab out/app-gplay.aab

    # 构建 Debug .apk（仅 arm64）
    - name: Build Debug .apk (arm64 only)
      run: |
        ./gradlew :app_pojavlauncher:assembleDebug -Pandroid.abiFilters=arm64-v8a
        mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug.apk

    # 构建不带运行时的 APK（仅 arm64）
    - name: Build APK without runtime (arm64 only)
      run: | 
        rm -r app_pojavlauncher/src/main/assets/components/jre
        ./gradlew assembleDebug -Pandroid.abiFilters=arm64-v8a
        mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug-noruntime.apk

    - name: Upload APK
      uses: actions/upload-artifact@v2
      with:
          name: app-debug-arm64
          path: out/app-debug.apk
          
    - name: Upload onto the Google Play testing track
      if: github.repository_owner == 'PojavLauncherTeam' && github.ref_name == 'v3_openjdk'
      uses: r0adkll/upload-google-play@v1.0.15
      with:
        serviceAccountJsonPlainText: ${{ secrets.GPLAY_SERVICE_JSON }}
        packageName: net.kdt.pojavlaunch
        releaseFiles: out/app-gplay.aab
        track: internal
        inAppUpdatePriority: 5
        
    - name: Upload APK (without runtime)
      uses: actions/upload-artifact@v2
      with:
          name: app-debug-noruntime-arm64
          path: out/app-debug-noruntime.apk
